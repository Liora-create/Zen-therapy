<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Full Body Massage | Zen Therapy</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#f5eee7;
color:#2c211c;
direction:ltr;
}

header{
height:40vh;
background:
linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
url('spa.jpg.PNG') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
position:relative;
}

header h1{
font-weight:300;
letter-spacing:2px;
}

/* LANG SWITCH */
.lang-switch{
position:absolute;
top:15px;
right:15px;
}

.lang-switch button{
margin:3px;
padding:5px 10px;
border:none;
background:#a67c52;
color:white;
border-radius:20px;
cursor:pointer;
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
}

.container p{
line-height:1.6;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:14px 28px;
border-radius:30px;
background:#a67c52;
color:white;
text-decoration:none;
}

.back{
display:block;
margin-top:30px;
color:#a67c52;
text-decoration:none;
}

.content{
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.3s ease forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<header>

<div class="lang-switch">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('he')">HE</button>
</div>

<h1 id="title">Full Body Massage — 50 min</h1>

</header>

<div class="section">
<div class="container content">

<p id="desc">
A complete massage inspired by Californian and Swedish techniques,<br>
designed to relax the body and calm the mind.<br><br>
This treatment helps release tension and restore a deep sense of well-being.<br><br>
Duration: 50 minutes<br>
Price: 180₪
</p>

<a id="bookBtn" href="https://wa.me/972586874252" class="btn">
Book appointment
</a>

<a href="index.html" class="back" id="backBtn">← Back to treatments</a>

</div>
</div>

<script>

function setLang(lang){

localStorage.setItem("lang", lang);

/* DIRECTION */
if(lang==="he"){
document.body.style.direction="rtl";
}else{
document.body.style.direction="ltr";
}

/* FR */
if(lang==="fr"){
pageTitle.innerText="Massage corps entier | Zen Therapy";
title.innerText="Massage corps entier — 50 min";

desc.innerHTML="Un massage complet inspiré des techniques californiennes et suédoises,<br>conçu pour détendre le corps et apaiser l’esprit.<br><br>Ce soin aide à relâcher les tensions et à retrouver une sensation de bien-être global.<br><br>Durée : 50 minutes<br>Prix : 180₪";

bookBtn.innerText="Réserver un rendez-vous";
bookBtn.href="https://wa.me/972586874252?text=Bonjour,%20je%20souhaite%20réserver%20un%20massage%20corps%20entier%20(50%20min).";

backBtn.innerText="← Retour aux soins";
}

/* HE */
if(lang==="he"){
pageTitle.innerText="עיסוי גוף מלא | Zen Therapy";
title.innerText="עיסוי גוף מלא — 50 דקות";

desc.innerHTML="עיסוי מלא לגוף בהשראת טכניקות קליפורניות ושוודיות,<br>המיועד להרפיית הגוף והנפש.<br><br>הטיפול מסייע לשחרור מתחים ולהחזרת תחושת רוגע ואיזון.<br><br>משך הטיפול: 50 דקות<br>מחיר: 180₪";

bookBtn.innerText="קביעת תור";
bookBtn.href="https://wa.me/972586874252?text=שלום,%20אני%20רוצה%20לקבוע%20עיסוי%20גוף%20מלא%20(50%20דקות).";

backBtn.innerText="← חזרה לטיפולים";
}

/* EN */
if(lang==="en"){
pageTitle.innerText="Full Body Massage | Zen Therapy";
title.innerText="Full Body Massage — 50 min";

desc.innerHTML="A complete massage inspired by Californian and Swedish techniques,<br>designed to relax the body and calm the mind.<br><br>This treatment helps release tension and restore a deep sense of well-being.<br><br>Duration: 50 minutes<br>Price: 180₪";

bookBtn.innerText="Book appointment";
bookBtn.href="https://wa.me/972586874252?text=Hello,%20I%20would%20like%20to%20book%20a%20full%20body%20massage%20(50%20min).";

backBtn.innerText="← Back to treatments";
}

}

/* AUTO LOAD */
window.onload = function(){
let savedLang = localStorage.getItem("lang");
if(savedLang){
setLang(savedLang);
}
}

</script>

</body>
</html>
