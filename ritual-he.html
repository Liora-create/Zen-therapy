<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Complete Ritual | Zen Therapy</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#f5eee7;
color:#2c211c;
direction:ltr;
}

header{
height:40vh;
background:
linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
url('spa.jpg.PNG') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
position:relative;
}

header h1{
font-weight:300;
letter-spacing:2px;
}

/* LANG SWITCH */
.lang-switch{
position:absolute;
top:15px;
right:15px;
}

.lang-switch button{
margin:3px;
padding:5px 10px;
border:none;
background:#a67c52;
color:white;
border-radius:20px;
cursor:pointer;
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
}

.container p{
line-height:1.6;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:14px 28px;
border-radius:30px;
background:#a67c52;
color:white;
text-decoration:none;
}

.back{
display:block;
margin-top:30px;
color:#a67c52;
text-decoration:none;
}

.content{
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.3s ease forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<header>

<div class="lang-switch">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('he')">HE</button>
</div>

<h1 id="title">Complete Ritual — 70 min</h1>

</header>

<div class="section">
<div class="container content">

<p id="desc">
A complete wellness experience for deep relaxation of body and mind.<br><br>
This ritual includes a full-body massage with special attention to the face and scalp,<br>
for total release and lasting calm.<br><br>
Duration: 70 minutes<br>
Price: 250₪
</p>

<a id="bookBtn" href="https://wa.me/972586874252" class="btn">
Book appointment
</a>

<a href="index.html" class="back" id="backBtn">← Back to treatments</a>

</div>
</div>

<script>

function setLang(lang){

localStorage.setItem("lang", lang);

/* DIRECTION */
if(lang==="he"){
document.body.style.direction="rtl";
}else{
document.body.style.direction="ltr";
}

/* FR */
if(lang==="fr"){
pageTitle.innerText="Rituel complet | Zen Therapy";
title.innerText="Rituel complet — 70 min";

desc.innerHTML="Une expérience complète de bien-être pour une relaxation profonde du corps et de l’esprit.<br><br>Ce rituel inclut un massage complet avec une attention particulière portée au visage et au cuir chevelu,<br>pour un relâchement total et une sensation de calme durable.<br><br>Durée : 70 minutes<br>Prix : 250₪";

bookBtn.innerText="Réserver un rendez-vous";
bookBtn.href="https://wa.me/972586874252?text=Bonjour,%20je%20souhaite%20réserver%20le%20rituel%20complet%20(70%20min).";

backBtn.innerText="← Retour aux soins";
}

/* HE */
if(lang==="he"){
pageTitle.innerText="טיפול מלא | Zen Therapy";
title.innerText="טיפול מלא — 70 דקות";

desc.innerHTML="חוויה מלאה של רוגע להרפיה עמוקה של הגוף והנפש.<br><br>הטיפול כולל עיסוי גוף מלא עם דגש מיוחד על הפנים והקרקפת,<br>לשחרור מתחים ולהרגשה עמוקה של שלווה ורוגע.<br><br>משך הטיפול: 70 דקות<br>מחיר: 250₪";

bookBtn.innerText="קבעי תור";
bookBtn.href="https://wa.me/972586874252?text=שלום,%20אני%20רוצה%20לקבוע%20טיפול%20מלא%20(70%20דקות).";

backBtn.innerText="← חזרה לטיפולים";
}

/* EN */
if(lang==="en"){
pageTitle.innerText="Complete Ritual | Zen Therapy";
title.innerText="Complete Ritual — 70 min";

desc.innerHTML="A complete wellness experience for deep relaxation of body and mind.<br><br>This ritual includes a full-body massage with special attention to the face and scalp,<br>for total release and lasting calm.<br><br>Duration: 70 minutes<br>Price: 250₪";

bookBtn.innerText="Book appointment";
bookBtn.href="https://wa.me/972586874252?text=Hello,%20I%20would%20like%20to%20book%20the%20complete%20ritual%20(70%20min).";

backBtn.innerText="← Back to treatments";
}

}

/* AUTO LOAD */
window.onload = function(){
let savedLang = localStorage.getItem("lang");
if(savedLang){
setLang(savedLang);
}
}

</script>

</body>
</html>
