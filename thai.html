<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Massage thaï | Zen Therapy</title>

<style>
body{margin:0;font-family:Arial;background:#f5eee7;color:#2c211c;}
header{
height:40vh;
background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),url('spa.jpg.PNG') center/cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
position:relative;
text-align:center;
}

.lang-switch{
position:absolute;
top:15px;
right:15px;
}

.lang-switch button{
margin:3px;
padding:5px 10px;
border:none;
background:#a67c52;
color:white;
border-radius:20px;
cursor:pointer;
}

.section{
padding:60px 20px;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
}

.btn{
display:inline-block;
padding:14px 28px;
border-radius:30px;
background:#a67c52;
color:white;
text-decoration:none;
margin-top:20px;
}

.back{
display:block;
margin-top:30px;
color:#a67c52;
}
</style>
</head>

<body>

<header>

<div class="lang-switch">
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('he')">HE</button>
</div>

<h1 id="title">Massage thaï — 60 min</h1>

</header>

<div class="section">
<div class="container">

<p id="desc">
Un massage dynamique et énergisant combinant pressions et étirements doux.<br><br>
Réalisé au sol, il permet un travail profond sur le corps et la souplesse.<br><br>
Durée : 60 minutes<br>
Prix : 300₪
</p>

<a id="bookBtn" href="https://wa.me/972586874252" class="btn">
Réserver un rendez-vous
</a>

<a href="index.html" class="back" id="backBtn">← Retour aux soins</a>

</div>
</div>

<script>

function setLang(lang){

localStorage.setItem("lang", lang);

document.body.style.direction = (lang==="he") ? "rtl" : "ltr";

if(lang==="fr"){
pageTitle.innerText="Massage thaï | Zen Therapy";
title.innerText="Massage thaï — 60 min";
desc.innerHTML="Un massage dynamique et énergisant combinant pressions et étirements doux.<br><br>Réalisé au sol, il permet un travail profond sur le corps et la souplesse.<br><br>Durée : 60 minutes<br>Prix : 300₪";
bookBtn.innerText="Réserver un rendez-vous";
backBtn.innerText="← Retour aux soins";
}

if(lang==="en"){
pageTitle.innerText="Thai Massage | Zen Therapy";
title.innerText="Thai Massage — 60 min";
desc.innerHTML="A dynamic and energizing massage combining pressure and gentle stretching.<br><br>Performed on the floor, it works deeply on flexibility and body balance.<br><br>Duration: 60 minutes<br>Price: 300₪";
bookBtn.innerText="Book appointment";
backBtn.innerText="← Back to treatments";
}

if(lang==="he"){
pageTitle.innerText="עיסוי תאילנדי | Zen Therapy";
title.innerText="עיסוי תאילנדי — 60 דקות";
desc.innerHTML="עיסוי דינמי ואנרגטי המשלב לחיצות ומתיחות עדינות.<br><br>מתבצע על מזרן ומאפשר עבודה עמוקה על הגוף והגמישות.<br><br>משך: 60 דקות<br>מחיר: 300₪";
bookBtn.innerText="קבעי תור";
backBtn.innerText="← חזרה לטיפולים";
}

}

document.addEventListener("DOMContentLoaded", function(){
let savedLang = localStorage.getItem("lang") || "fr";
setLang(savedLang);
});

</script>

</body>
</html>
