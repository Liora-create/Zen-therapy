<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Hot Stone Massage | Zen Therapy</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#f5eee7;
color:#2c211c;
direction:ltr;
}

header{
height:40vh;
background:
linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
url('spa.jpg.PNG') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
position:relative;
}

header h1{
font-weight:300;
letter-spacing:2px;
}

/* LANG */
.lang-switch{
position:absolute;
top:15px;
right:15px;
}

.lang-switch button{
margin:3px;
padding:5px 10px;
border:none;
background:#a67c52;
color:white;
border-radius:20px;
cursor:pointer;
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
}

.container p{
line-height:1.6;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:14px 28px;
border-radius:30px;
background:#a67c52;
color:white;
text-decoration:none;
}

.back{
display:block;
margin-top:30px;
color:#a67c52;
text-decoration:none;
}

.content{
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.3s ease forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<header>

<div class="lang-switch">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('he')">HE</button>
</div>

<h1 id="title">Hot Stone Massage — 60 min</h1>

</header>

<div class="section">
<div class="container content">

<p id="desc">
A deeply relaxing massage using warm stones to release tension and soothe muscles.<br><br>
The heat penetrates deeply, promoting intense relaxation and a lasting feeling of well-being.<br><br>
Duration: 60 minutes<br>
Price: 300₪
</p>

<a id="bookBtn" href="https://wa.me/972586874252" class="btn">
Book appointment
</a>

<a href="index.html" class="back" id="backBtn">← Back to treatments</a>

</div>
</div>

<script>

function setLang(lang){

localStorage.setItem("lang", lang);

/* direction */
if(lang==="he"){
document.body.style.direction="rtl";
}else{
document.body.style.direction="ltr";
}

/* FR */
if(lang==="fr"){
pageTitle.innerText="Pierres chaudes | Zen Therapy";
title.innerText="Massage aux pierres chaudes — 60 min";

desc.innerHTML="Un massage profondément relaxant utilisant des pierres chaudes pour détendre les muscles et libérer les tensions.<br><br>La chaleur des pierres pénètre profondément et favorise une relaxation intense.<br><br>Durée : 60 minutes<br>Prix : 300₪";

bookBtn.innerText="Réserver un rendez-vous";
bookBtn.href="https://wa.me/972586874252?text=Bonjour,%20je%20souhaite%20réserver%20un%20massage%20aux%20pierres%20chaudes%20(60%20min).";

backBtn.innerText="← Retour aux soins";
}

/* HE */
if(lang==="he"){
pageTitle.innerText="אבנים חמות | Zen Therapy";
title.innerText="עיסוי אבנים חמות — 60 דקות";

desc.innerHTML="עיסוי מרגיע עמוק באמצעות אבנים חמות לשחרור מתחים והרפיית השרירים.<br><br>החום חודר עמוק ומעניק תחושת רוגע עמוקה ומתמשכת.<br><br>משך: 60 דקות<br>מחיר: 300₪";

bookBtn.innerText="קבעי תור";
bookBtn.href="https://wa.me/972586874252?text=שלום,%20אני%20רוצה%20לקבוע%20עיסוי%20אבנים%20חמות%20(60%20דקות).";

backBtn.innerText="← חזרה לטיפולים";
}

/* EN */
if(lang==="en"){
pageTitle.innerText="Hot Stone Massage | Zen Therapy";
title.innerText="Hot Stone Massage — 60 min";

desc.innerHTML="A deeply relaxing massage using warm stones to release tension and soothe muscles.<br><br>The heat penetrates deeply, promoting intense relaxation and a lasting feeling of well-being.<br><br>Duration: 60 minutes<br>Price: 300₪";

bookBtn.innerText="Book appointment";
bookBtn.href="https://wa.me/972586874252?text=Hello,%20I%20would%20like%20to%20book%20a%20hot%20stone%20massage%20(60%20min).";

backBtn.innerText="← Back to treatments";
}

}

/* auto load */
window.onload = function(){
let savedLang = localStorage.getItem("lang");
if(savedLang){
setLang(savedLang);
}
}

</script>

</body>
</html>
