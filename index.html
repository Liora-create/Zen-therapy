<style>
body{
margin:0;
font-family: "Arial";
background:#f3eee7;
color:#2c2520;
}

/* HERO */
header{
height:90vh;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url('https://images.unsplash.com/photo-1588776814546-ec7e6d0e5d6e') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

header h1{
font-size:3.5em;
letter-spacing:3px;
}

header p{
font-size:1.2em;
opacity:0.9;
}

.btn{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:30px;
background:#b8975c;
color:white;
cursor:pointer;

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
}

.section h2{
font-size:2em;
margin-bottom:30px;
}

/* GRID */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

/* CARD */
.card{
width:270px;
height:180px;
border-radius:20px;
overflow:hidden;
position:relative;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
transition:0.3s;
text-decoration:none;
}

.card:hover{
transform:translateY(-8px);
}

.card::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

.card span{
position:absolute;
bottom:15px;
left:20px;
color:white;
font-size:1.3em;
font-weight:bold;
z-index:2;
}

/* IMAGES LUXE COHÉRENTES */
.card1{
background:url('https://images.unsplash.com/photo-1556228720-195a672e8a03') center/cover;
}

}

.card3{
