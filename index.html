<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Therapy | Liora</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#f5eee7;
color:#2c211c;
}

/* IMAGES */
:root{
--hero-image: url('spa.jpg.PNG');
--card-image: url('spa-cards.jpg.PNG');
}

/* HERO */
header{
min-height:100vh;
height:100svh;
background:
linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
var(--hero-image) center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
padding:20px;
position:relative;
}

header h1{
font-family:'Playfair Display', serif;
font-size:3.5em;
letter-spacing:3px;
font-weight:300;
}

header p{
font-size:1.2em;
opacity:0.9;
}

.btn{
display:inline-block;
margin-top:20px;
padding:14px 28px;
border-radius:30px;
background:#a67c52;
color:white;
text-decoration:none;
font-size:1em;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* LANG SWITCH */
.lang-switch{
position:absolute;
top:25px;
right:25px;
z-index:10;
display:flex;
gap:8px;
}

.lang-switch button{
padding:6px 12px;
border:none;
border-radius:20px;
background:#a67c52;
color:white;
font-size:0.75em;
cursor:pointer;
transition:0.3s;
opacity:0.9;
}

.lang-switch button:hover{
opacity:1;
transform:translateY(-2px);
}

/* SECTION */
.section{
padding:80px 20px 100px;
text-align:center;
}

.section h2{
font-family:'Playfair Display', serif;
font-size:1.8em;
font-weight:300;
margin-bottom:40px;
letter-spacing:1px;
color:#3a2a24;
}
/* GRID */
.grid{
display:block;
width:100%;
margin:0;
padding:0;
}
/* CARD */
.card{
width:100vw;
margin-left:calc(-50vw + 50%);
height:110px;
margin-bottom:30px;
display:flex;
align-items:center;
justify-content:center;
background:var(--card-image) center/cover no-repeat;
position:relative;
border-radius:0;
  overflow:hidden;
}
.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 18px 40px rgba(0,0,0,0.2);
}

.card::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(2px);
}

.card span{
position:relative;
color:white;
font-family:'Playfair Display', serif;
font-size:1.4em;
letter-spacing:2px;
z-index:2;
text-align:center;
text-decoration:none;
font-weight:300;
text-shadow:0 2px 10px rgba(0,0,0,0.4);
}

/* MOBILE */
@media (max-width: 768px){
header h1{font-size:2.2em;}
header{height:100svh;}
.card{width:90%;}
}

/* ANIMATION HERO */
.hero-content{
opacity:0;
transform:translateY(40px);
animation:fadeUp 1.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.hero-content h1{
text-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.hero-content p{
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
animation-delay:0.3s;
}

.hero-content .btn{
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
animation-delay:0.6s;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<header>

<div class="lang-switch">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('he')">HE</button>
</div>

<div class="hero-content">
<h1>Zen Therapy</h1>
<p id="subtitle">Private Massage Experience</p>
<a href="https://wa.me/972586874252" class="btn" id="mainBtn">Send message</a>
</div>

</header>

<div class="section">
<h2 id="sectionTitle">Your Treatments</h2>

<div class="grid">

<a id="link1" href="semi-massage.html" class="card">
<span id="card1">Semi Massage — 30 min</span>
</a>

<a id="link2" href="full-body.html" class="card">
<span id="card2">Full Body Massage — 50 min</span>
</a>

<a id="link3" href="ritual.html" class="card">
<span id="card3">Complete Ritual — 70 min</span>
</a>

<a id="link4" href="thai.html" class="card">
<span id="card4">Thai Massage — 60 min</span>
</a>

<a id="link5" href="hot-stone.html" class="card">
<span id="card5">Hot Stone Massage — 60 min</span>
</a>

</div>
</div>

<script>
function setLang(lang){

// Sauvegarde la langue
localStorage.setItem("lang", lang);

// FR
if(lang === "fr"){
document.getElementById("subtitle").innerText = "Expérience de massage privée";
document.getElementById("sectionTitle").innerText = "Les soins";

document.getElementById("card1").innerText = "Massage ciblé — 30 min";
document.getElementById("card2").innerText = "Massage corps entier — 50 min";
document.getElementById("card3").innerText = "Rituel complet — 70 min";
document.getElementById("card4").innerText = "Massage thaï — 60 min";
document.getElementById("card5").innerText = "Pierres chaudes — 60 min";

document.getElementById("mainBtn").innerText = "Envoyer un message";

document.getElementById("link1").href = "semi-massage-fr.html";
document.getElementById("link2").href = "full-body-fr.html";
document.getElementById("link3").href = "ritual-fr.html";
document.getElementById("link4").href = "thai-fr.html";
document.getElementById("link5").href = "hot-stone-fr.html";
}

// HE
if(lang === "he"){
document.getElementById("subtitle").innerText = "חווית עיסוי פרטית";
document.getElementById("sectionTitle").innerText = "הטיפולים";

document.getElementById("card1").innerText = "עיסוי חלקי — 30 דקות";
document.getElementById("card2").innerText = "עיסוי גוף מלא — 50 דקות";
document.getElementById("card3").innerText = "טיפול מלא — 70 דקות";
document.getElementById("card4").innerText = "עיסוי תאילנדי — 60 דקות";
document.getElementById("card5").innerText = "אבנים חמות — 60 דקות";

document.getElementById("mainBtn").innerText = "שלח הודעה";

document.getElementById("link1").href = "semi-massage-he.html";
document.getElementById("link2").href = "full-body-he.html";
document.getElementById("link3").href = "ritual-he.html";
document.getElementById("link4").href = "thai-he.html";
document.getElementById("link5").href = "hot-stone-he.html";
}

// EN
if(lang === "en"){
document.getElementById("subtitle").innerText = "Private Massage Experience";
document.getElementById("sectionTitle").innerText = "Your Treatments";

document.getElementById("card1").innerText = "Semi Massage — 30 min";
document.getElementById("card2").innerText = "Full Body Massage — 50 min";
document.getElementById("card3").innerText = "Complete Ritual — 70 min";
document.getElementById("card4").innerText = "Thai Massage — 60 min";
document.getElementById("card5").innerText = "Hot Stone Massage — 60 min";

document.getElementById("mainBtn").innerText = "Send message";

document.getElementById("link1").href = "semi-massage.html";
document.getElementById("link2").href = "full-body.html";
document.getElementById("link3").href = "ritual.html";
document.getElementById("link4").href = "thai.html";
document.getElementById("link5").href = "hot-stone.html";
}
}

// Recharge la langue automatiquement
window.onload = function(){
let savedLang = localStorage.getItem("lang");
if(savedLang){
setLang(savedLang);
}
}
</script>

</body>
</html>
