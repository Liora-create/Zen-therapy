<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Therapy</title>

<style>

/* ===== BACKGROUND LUXE ===== */
body{
margin:0;
font-family:Arial;
background:linear-gradient(to bottom,#1f1915,#3a2e24,#6d533f,#b79a7a);
color:white;
}

/* ===== HERO ===== */
header{
height:100vh;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),url('spa.jpg.PNG') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero-content{
animation:fadeSlide 1.2s ease;
}

@keyframes fadeSlide{
from{opacity:0; transform:translateY(50px);}
to{opacity:1; transform:translateY(0);}
}

/* ===== LANG ===== */
.lang-switch{
position:absolute;
top:20px;
right:20px;
}

.lang-switch button{
margin:3px;
padding:6px 12px;
background:#a67c52;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

/* ===== SECTION ===== */
.section{
padding:40px 20px;
max-width:800px;
margin:auto;
}

/* ===== BANDES ===== */
.band{
background:rgba(0,0,0,0.65);
padding:20px;
margin:15px 0;
border-radius:12px;
cursor:pointer;
}

.content{
max-height:0;
overflow:hidden;
transition:0.5s;
background:rgba(255,255,255,0.08);
padding:0 20px;
border-radius:0 0 12px 12px;
opacity:0;
transform:translateY(20px);
}

.content.open{
max-height:900px;
padding:20px;
opacity:1;
transform:translateY(0);
}

/* ===== BUTTON ===== */
.btn{
display:inline-block;
margin-top:15px;
padding:12px 24px;
background:#a67c52;
color:white;
border-radius:25px;
text-decoration:none;
}

/* ===== REVIEWS ===== */
.review{
background:rgba(255,255,255,0.1);
padding:15px;
margin:10px 0;
border-radius:10px;
}

.stars{
color:#f4c542;
}

/* ===== FORM ===== */
input, textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
}

/* ===== FOOTER ===== */
.footer{
text-align:center;
padding:40px 20px;
}

</style>
</head>

<body>

<header>

<div class="lang-switch">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('he')">HE</button>
</div>

<div class="hero-content">
<h1 id="heroTitle"></h1>
<p id="heroSub"></p>
<a id="heroBtn" href="https://wa.me/972586874252" class="btn"></a>
</div>

</header>

<div class="section">

<!-- SEMI -->
<div class="band" onclick="toggle(this)">
<div id="semiTitle"></div>
<div class="content">
<p id="semiText"></p>
<a id="semiBtn" class="btn" href="https://wa.me/972586874252"></a>
</div>
</div>

<!-- FULL -->
<div class="band" onclick="toggle(this)">
<div id="fullTitle"></div>
<div class="content">
<p id="fullText"></p>
<a id="fullBtn" class="btn" href="https://wa.me/972586874252"></a>
</div>
</div>

<!-- RITUAL -->
<div class="band" onclick="toggle(this)">
<div id="ritualTitle"></div>
<div class="content">
<p id="ritualText"></p>
<a id="ritualBtn" class="btn" href="https://wa.me/972586874252"></a>
</div>
</div>

<!-- THAI -->
<div class="band" onclick="toggle(this)">
<div id="thaiTitle"></div>
<div class="content">
<p id="thaiText"></p>
<a id="thaiBtn" class="btn" href="https://wa.me/972586874252"></a>
</div>
</div>

<!-- HOT STONE -->
<div class="band" onclick="toggle(this)">
<div id="stoneTitle"></div>
<div class="content">
<p id="stoneText"></p>
<a id="stoneBtn" class="btn" href="https://wa.me/972586874252"></a>
</div>
</div>

</div>

<!-- REVIEWS -->
<div class="section">
<h2>Client Reviews</h2>

<div class="review">
<div class="stars">★★★★★</div>
<p>Amazing massage, I felt completely relaxed.</p>
<strong>Sarah</strong>
</div>

<div class="review">
<div class="stars">★★★★★</div>
<p>Very professional and calming experience.</p>
<strong>Lea</strong>
</div>

</div>

<!-- FORM -->
<div class="section">
<h2>Leave a review</h2>

<input id="name" placeholder="Your name">
<input id="stars" placeholder="Stars (1-5)">
<textarea id="message" placeholder="Your message"></textarea>

<button class="btn" onclick="sendReview()">Send</button>
</div>

<!-- FOOTER -->
<div class="footer">
<p><strong>Liora</strong></p>
<p id="locationText"></p>
<p><a href="https://instagram.com/zen_therapy_liora" target="_blank">@zen_therapy_liora</a></p>
</div>

<script>

function toggle(el){
el.querySelector(".content").classList.toggle("open");
}

function sendReview(){
let name=document.getElementById("name").value;
let stars=document.getElementById("stars").value;
let msg=document.getElementById("message").value;
let text=`Review:%0AName: ${name}%0AStars: ${stars}%0AMessage: ${msg}`;
window.open(`https://wa.me/972586874252?text=${text}`);
}

function setLang(lang){

localStorage.setItem("lang",lang);
document.body.style.direction=(lang==="he")?"rtl":"ltr";

/* EN */
if(lang==="en"){
heroTitle.innerText="Relaxation & Wellness";
heroSub.innerText="A moment just for you";
heroBtn.innerText="Send message";
locationText.innerText="Located in Harish";

semiTitle.innerText="Semi Massage — 30 min — 100₪";
semiText.innerText="A relaxing massage focused on two areas of your choice such as the back, shoulders or legs. Ideal for relieving tension quickly and effectively.";
semiBtn.innerText="Book";

fullTitle.innerText="Full Body Massage — 50 min — 180₪";
fullText.innerText="A complete massage of the entire body that promotes deep relaxation, improves circulation and helps release accumulated stress.";
fullBtn.innerText="Book";

ritualTitle.innerText="Complete Ritual — 70 min — 250₪";
ritualText.innerText="A full wellness experience including body, face and scalp massage for total relaxation and deep calm.";
ritualBtn.innerText="Book";

thaiTitle.innerText="Thai Massage — 60 min — 300₪";
thaiText.innerText="A deep massage performed on the floor combining stretching and pressure to improve flexibility and release deep tension.";
thaiBtn.innerText="Book";

stoneTitle.innerText="Hot Stone Massage — 60 min — 300₪";
stoneText.innerText="A deeply relaxing massage using warm stones to release muscle tension and create a sensation of comfort and well-being.";
stoneBtn.innerText="Book";
}

/* FR */
if(lang==="fr"){
heroTitle.innerText="Relaxation & Bien-être";
heroSub.innerText="Un moment pour vous";
heroBtn.innerText="Envoyer un message";
locationText.innerText="Située à Harish";

semiTitle.innerText="Massage ciblé — 30 min — 100₪";
semiText.innerText="Massage relaxant sur deux zones du corps au choix (dos, épaules, jambes…). Idéal pour soulager rapidement les tensions.";
semiBtn.innerText="Réserver";

fullTitle.innerText="Massage corps entier — 50 min — 180₪";
fullText.innerText="Massage complet de tout le corps favorisant une détente profonde et un relâchement global.";
fullBtn.innerText="Réserver";

ritualTitle.innerText="Rituel complet — 70 min — 250₪";
ritualText.innerText="Expérience complète incluant le corps, le visage et le cuir chevelu pour une relaxation totale.";
ritualBtn.innerText="Réserver";

thaiTitle.innerText="Massage thaï — 60 min — 300₪";
thaiText.innerText="Massage au sol combinant étirements et pressions profondes pour travailler en profondeur le corps.";
thaiBtn.innerText="Réserver";

stoneTitle.innerText="Pierres chaudes — 60 min — 300₪";
stoneText.innerText="Massage relaxant utilisant des pierres chaudes pour détendre les muscles en profondeur.";
stoneBtn.innerText="Réserver";
}

/* HE */
if(lang==="he"){
heroTitle.innerText="רוגע ושלווה";
heroSub.innerText="רגע לעצמך";
heroBtn.innerText="שלחי הודעה";
locationText.innerText="ממוקמת בחריש";

semiTitle.innerText="עיסוי חלקי — 30 דקות";
semiText.innerText="עיסוי ממוקד בשני אזורים לבחירתך לשחרור מתחים.";
semiBtn.innerText="קבעי תור";

fullTitle.innerText="עיסוי גוף מלא — 50 דקות";
fullText.innerText="עיסוי מלא להרפיה עמוקה של הגוף.";
fullBtn.innerText="קבעי תור";

ritualTitle.innerText="טיפול מלא — 70 דקות";
ritualText.innerText="כולל גוף, פנים וקרקפת להרפיה מלאה.";
ritualBtn.innerText="קבעי תור";

thaiTitle.innerText="עיסוי תאילנדי — 60 דקות";
thaiText.innerText="עיסוי עמוק עם מתיחות על מזרן.";
thaiBtn.innerText="קבעי תור";

stoneTitle.innerText="אבנים חמות — 60 דקות";
stoneText.innerText="עיסוי מרגיע עם אבנים חמות.";
stoneBtn.innerText="קבעי תור";
}

}

document.addEventListener("DOMContentLoaded",()=>{
setLang(localStorage.getItem("lang") || "en");
});

</script>

</body>
</html>
