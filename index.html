<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Therapy | Liora</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#f5eee7;
color:#2c211c;
}

/* IMAGES */
:root{
--hero-image: url('spa.jpg.PNG');
--card-image: url('spa-cards.jpg.PNG');
}

/* HERO */
header{
min-height:100vh;
height:100svh;
background:
linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
var(--hero-image) center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
padding:20px;
}

header h1{
font-size:3.5em;
letter-spacing:3px;
font-weight:300;
}

header p{
font-size:1.2em;
opacity:0.9;
}

.btn{
display:inline-block;
margin-top:20px;
padding:14px 28px;
border-radius:30px;
background:#a67c52;
color:white;
text-decoration:none;
font-size:1em;
}

/* SECTION */
.section{
padding:70px 20px;
text-align:center;
}

.section h2{
font-size:1.8em;
font-weight:300;
margin-bottom:40px;
letter-spacing:1px;
color:#3a2a24;
}

/* GRID */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
}

/* CARD */
.card{
width:220px;
height:140px;
border-radius:16px;
overflow:hidden;
position:relative;
text-decoration:none;
box-shadow:0 12px 30px rgba(0,0,0,0.15);
transition:0.3s;
background:var(--card-image) center/cover;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 18px 40px rgba(0,0,0,0.2);
}

.card::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.5), transparent 60%);
}

.card span{
position:absolute;
bottom:15px;
left:20px;
color:white;
font-size:1.1em;
z-index:2;
}

/* MOBILE */
@media (max-width: 768px){
header h1{font-size:2.2em;}
header{height:100svh;}
.card{width:90%;}
}

/* ANIMATION HERO */

.hero-content{
opacity:0;
transform:translateY(40px);
animation:fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.hero-content h1{
text-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.hero-content p{
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
animation-delay:0.3s;
}

.hero-content .btn{
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
animation-delay:0.6s;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<header>
<div class="hero-content">
<h1>Zen Therapy</h1>
<p>Luxury Spa Experience</p>
<a href="https://wa.me/972586874252" class="btn">Send message</a>
</div>
</header>

<div class="section">
<h2>Choose your treatment</h2>

<div class="grid">

<a href="californian.html" class="card">
<span>Californian / Swedish</span>
</a>

<a href="thai.html" class="card">
<span>Thai Massage</span>
</a>

<a href="stones.html" class="card">
<span>Hot Stones</span>
</a>

<a href="ritual.html" class="card">
<span>Complete Ritual</span>
</a>

</div>
</div>

</body>
</html>
