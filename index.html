<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Therapy | Liora</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family: Arial, sans-serif;
background:#f5eee7;
color:#2c211c;
overflow-x:hidden;
}

/* HERO */
header{
min-height:100vh;
height:100svh;
background:
linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
url('spa.jpg.PNG') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
padding:20px;
position:relative;
}

header h1{
font-family:'Playfair Display', serif;
font-size:3.5em;
letter-spacing:3px;
font-weight:300;
}

header p{
font-size:1.2em;
opacity:0.9;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:20px;
padding:14px 28px;
border-radius:30px;
background:#a67c52;
color:white;
text-decoration:none;
font-size:1em;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* LANG SWITCH */
.lang-switch{
position:absolute;
top:25px;
right:25px;
z-index:10;
display:flex;
gap:8px;
}

.lang-switch button{
padding:6px 12px;
border:none;
border-radius:20px;
background:#a67c52;
color:white;
font-size:0.75em;
cursor:pointer;
transition:0.3s;
opacity:0.9;
}

.lang-switch button:hover{
opacity:1;
transform:translateY(-2px);
}

/* SECTION */
.section{
padding:80px 0;
text-align:center;
}

.section h2{
font-family:'Playfair Display', serif;
font-size:1.8em;
font-weight:300;
margin-bottom:50px;
letter-spacing:1px;
color:#3a2a24;
}

/* GRID */
.grid{
display:block;
width:100%;
}

/* CARD FULL WIDTH + LUXE LIGHT EFFECT */
.card{
position:relative;
left:50%;
margin-left:-50vw;
width:100vw;
height:90px;
margin-bottom:35px;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(135deg, #b88f64, #a67c52, #8c6949),
radial-gradient(circle at 30% 20%, rgba(255,255,255,0.12), transparent 60%);

border-radius:0;
text-decoration:none;
color:inherit;
transition:0.4s ease;
}

/* HOVER */
.card:hover{
transform:scale(1.015);
}

/* TEXT */
.card span{
position:relative;
color:white;
font-family:'Playfair Display', serif;
font-size:1.45em;
letter-spacing:2.5px;
z-index:2;
text-align:center;
font-weight:300;
text-shadow:0 4px 20px rgba(0,0,0,0.35);
text-decoration:none !important;
}

/* MOBILE */
@media (max-width:768px){
header h1{font-size:2.2em;}
.card{height:80px;}
.card span{
font-size:1.1em;
letter-spacing:1.5px;
}
}

/* ANIMATION */
.hero-content{
opacity:0;
transform:translateY(40px);
animation:fadeUp 1.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.hero-content p{
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
animation-delay:0.3s;
}

.hero-content .btn{
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
animation-delay:0.6s;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<header>

<div class="lang-switch">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('he')">HE</button>
</div>

<div class="hero-content">
<h1>Zen Therapy</h1>
<p id="subtitle">Private Massage Experience</p>
<a href="https://wa.me/972586874252" class="btn" id="mainBtn">Send message</a>
</div>

</header>

<div class="section">
<h2 id="sectionTitle">Your Treatments</h2>

<div class="grid">

<a id="link1" href="semi-massage.html" class="card">
<span id="card1">Semi Massage — 30 min</span>
</a>

<a id="link2" href="full-body.html" class="card">
<span id="card2">Full Body Massage — 50 min</span>
</a>

<a id="link3" href="ritual.html" class="card">
<span id="card3">Complete Ritual — 70 min</span>
</a>

<a id="link4" href="thai.html" class="card">
<span id="card4">Thai Massage — 60 min</span>
</a>

<a id="link5" href="hot-stone.html" class="card">
<span id="card5">Hot Stone Massage — 60 min</span>
</a>

</div>
</div>

<script>
function setLang(lang){

localStorage.setItem("lang", lang);

if(lang === "fr"){
subtitle.innerText = "Expérience de massage privée";
sectionTitle.innerText = "Les soins";
card1.innerText = "Massage ciblé — 30 min";
card2.innerText = "Massage corps entier — 50 min";
card3.innerText = "Rituel complet — 70 min";
card4.innerText = "Massage thaï — 60 min";
card5.innerText = "Pierres chaudes — 60 min";
mainBtn.innerText = "Envoyer un message";
link1.href="semi-massage-fr.html";
link2.href="full-body-fr.html";
link3.href="ritual-fr.html";
link4.href="thai-fr.html";
link5.href="hot-stone-fr.html";
}

if(lang === "he"){
subtitle.innerText = "חווית עיסוי פרטית";
sectionTitle.innerText = "הטיפולים";
card1.innerText = "עיסוי חלקי — 30 דקות";
card2.innerText = "עיסוי גוף מלא — 50 דקות";
card3.innerText = "טיפול מלא — 70 דקות";
card4.innerText = "עיסוי תאילנדי — 60 דקות";
card5.innerText = "אבנים חמות — 60 דקות";
mainBtn.innerText = "שלח הודעה";
link1.href="semi-massage-he.html";
link2.href="full-body-he.html";
link3.href="ritual-he.html";
link4.href="thai-he.html";
link5.href="hot-stone-he.html";
}

if(lang === "en"){
subtitle.innerText = "Private Massage Experience";
sectionTitle.innerText = "Your Treatments";
card1.innerText = "Semi Massage — 30 min";
card2.innerText = "Full Body Massage — 50 min";
card3.innerText = "Complete Ritual — 70 min";
card4.innerText = "Thai Massage — 60 min";
card5.innerText = "Hot Stone Massage — 60 min";
mainBtn.innerText = "Send message";
link1.href="semi-massage.html";
link2.href="full-body.html";
link3.href="ritual.html";
link4.href="thai.html";
link5.href="hot-stone.html";
}
}

window.onload = function(){
let savedLang = localStorage.getItem("lang");
if(savedLang){setLang(savedLang);}
}
</script>

</body>
</html>
