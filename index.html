<style>
body{
margin:0;
font-family: Arial, sans-serif;
background:#f6f2ec;
color:#2b2521;
}

/* HERO */
header{
height:90vh;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url('https://images.unsplash.com/photo-1540555700478-4be289fbe874') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
padding:20px;
}

header h1{
font-size:3.5em;
letter-spacing:3px;
font-weight:300;
}

header p{
font-size:1.2em;
opacity:0.9;
}

.btn{
margin-top:20px;
padding:14px 28px;
border:none;
border-radius:30px;
background:#c2a875;
color:white;
cursor:pointer;
font-size:1em;
}

/* SECTION */
.section{
padding:70px 20px;
text-align:center;
}

.section h2{
font-size:1.8em;
font-weight:300;
margin-bottom:40px;
letter-spacing:1px;
}

/* GRID */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

/* CARD */
.card{
width:280px;
height:180px;
border-radius:16px;
overflow:hidden;
position:relative;
text-decoration:none;
box-shadow:0 12px 30px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

/* overlay luxe */
.card::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

.card span{
position:absolute;
bottom:15px;
left:20px;
color:white;
font-size:1.1em;
font-weight:400;
z-index:2;
}

/* 💆 Californien / Suédois (massage table classique luxe) */
.card1{
background:url('https://images.unsplash.com/photo-1544161515-4ab6ce6db874') center/cover;
}

/* 🧘 Thai Massage (tapis au sol motifs / futon zen) */
.card2{
background:url('https://images.unsplash.com/photo-1552693673-1bf958298935') center/cover;
}

/* 🔥 Hot Stones (dos + pierres chaudes) */
.card3{
background:url('https://images.unsplash.com/photo-1600334129128-685c5582fd35') center/cover;
}

/* 💎 Complete Ritual (soin visage spa luxe) */
.card4{
background:url('https://images.unsplash.com/photo-1556228720-195a672e8a03') center/cover;
}

</style>
</head>
