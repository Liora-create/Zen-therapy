<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Therapy | Liora Massage</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f4f1ec;
    color:#2b2b2b;
}

/* HEADER */
header {
    background: linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
    url('https://images.unsplash.com/photo-1544161515-4ab6ce6db874') center/cover;
    height:85vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
}

header h1 {
    font-size:3em;
    letter-spacing:2px;
}

button.main {
    background:#b89b6a;
    border:none;
    padding:15px 25px;
    color:white;
    border-radius:30px;
    cursor:pointer;
    margin-top:20px;
}

/* LANG */
.lang {
    position:fixed;
    top:10px;
    right:10px;
}

.lang button {
    margin:3px;
    padding:6px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* SERVICES */
section {
    padding:50px 20px;
    text-align:center;
}

.grid {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card {
    background:white;
    width:260px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:white;
    padding:30px;
    width:80%;
    max-width:400px;
    border-radius:15px;
    text-align:center;
}

.close {
    float:right;
    cursor:pointer;
    font-size:20px;
}
</style>
</head>

<body>

<div class="lang">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('he')">HE</button>
</div>

<header>
    <div>
        <h1 id="title">Zen Therapy</h1>
        <p id="subtitle">Relaxation & Spa Experience by Liora</p>
        <a href="https://wa.me/972586874252">
            <button class="main" id="btn">Prendre rendez-vous</button>
        </a>
    </div>
</header>

<section>
    <h2 id="servicesTitle">Massages</h2>

    <div class="grid">

        <div class="card" onclick="openModal('m1')">
            <h3>Discovery 30 min</h3>
            <p>100₪</p>
        </div>

        <div class="card" onclick="openModal('m2')">
            <h3>Classic 50 min</h3>
            <p>180₪</p>
        </div>

        <div class="card" onclick="openModal('m3')">
            <h3>Complete Ritual</h3>
            <p>250₪</p>
        </div>

        <div class="card" onclick="openModal('m4')">
            <h3>Thai Massage</h3>
            <p>200₪</p>
        </div>

        <div class="card" onclick="openModal('m5')">
            <h3>Hot Stones</h3>
            <p>200₪</p>
        </div>

    </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <h2 id="mTitle"></h2>
        <p id="mText"></p>
    </div>
</div>

<script>

const data = {
m1:{
title:"Discovery Massage",
text:"30 min massage focusing on 2 areas of tension. Perfect for quick relaxation."
},
m2:{
title:"Classic Massage",
text:"50 min full body relaxation (excluding head). Deep tension release."
},
m3:{
title:"Complete Ritual",
text:"70 min full body massage including face and scalp. Deep luxury relaxation experience."
},
m4:{
title:"Thai Massage",
text:"Traditional stretching massage improving flexibility and energy flow."
},
m5:{
title:"Hot Stones",
text:"Warm stone therapy for deep muscle relaxation and stress relief."
}
};

function openModal(id){
document.getElementById("modal").style.display="flex";
document.getElementById("mTitle").innerText=data[id].title;
document.getElementById("mText").innerText=data[id].text;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function setLang(lang){
alert("Language switch coming next step 👍");
}

</script>

</body>
</html>
