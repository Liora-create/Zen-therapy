<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Therapy | Liora</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family: Arial, sans-serif;
background: linear-gradient(180deg, #2c211c, #1a1310);
color:#f1e7dc;
overflow-x:hidden;
}

/* RESET LIENS */
a{
text-decoration:none;
color:inherit;
}

/* HERO */
header{
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
url('spa.jpg.PNG') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
padding:20px;
position:relative;
}

header h1{
font-family:'Playfair Display', serif;
font-size:3.5em;
letter-spacing:3px;
font-weight:300;
}

header p{
font-size:1.2em;
opacity:0.9;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:20px;
padding:14px 28px;
border-radius:30px;
background:#a67c52;
color:white;
font-size:1em;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

/* LANG SWITCH */
.lang-switch{
position:absolute;
top:25px;
right:25px;
display:flex;
gap:8px;
}

.lang-switch button{
padding:6px 12px;
border:none;
border-radius:20px;
background:#a67c52;
color:white;
font-size:0.75em;
cursor:pointer;
}

/* SECTION */
.section{
padding:80px 0;
text-align:center;
}

/* TITRES */
.section h2{
font-family:'Playfair Display', serif;
font-size:1.9em;
font-weight:300;
margin-bottom:50px;
letter-spacing:1px;
color:#f1e7dc;
}

/* GRID */
.grid{
display:block;
}

/* BANDES */
.card{
position:relative;
left:50%;
margin-left:-50vw;
width:100vw;
height:90px;
margin-bottom:35px;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(135deg, #b88f64, #a67c52, #8c6949);

transition:0.3s;
}

/* VOILE (CORRIGÉ) */
.card::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
}

/* HOVER */
.card:hover{
transform:scale(1.02);
}

/* TEXTE */
.card span{
position:relative;
color:white;
font-family:'Playfair Display', serif;
font-size:1.45em;
letter-spacing:2.5px;
z-index:2;
text-shadow:0 4px 20px rgba(0,0,0,0.6);
text-decoration:none !important;
}

/* ESPACE */
.special-title{
margin-top:90px;
}

/* MOBILE */
@media (max-width:768px){
header h1{font-size:2.2em;}
.card{height:80px;}
.card span{
font-size:1.1em;
letter-spacing:1.5px;
}
}

</style>
</head>

<body>

<header>

<div class="lang-switch">
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('he')">HE</button>
</div>

<div>
<h1>Zen Therapy</h1>
<p id="subtitle">Private Massage Experience</p>
<a href="#" class="btn" id="mainBtn">Send message</a>
</div>

</header>

<div class="section">

<h2 id="sectionTitle">Your Treatments</h2>

<div class="grid">

<a href="semi-massage.html" class="card">
<span id="card1">Semi Massage — 30 min — 100₪</span>
</a>

<a href="full-body.html" class="card">
<span id="card2">Full Body Massage — 50 min — 180₪</span>
</a>

<a href="ritual.html" class="card">
<span id="card3">Complete Ritual — 70 min — 250₪</span>
</a>

</div>

<h2 class="special-title" id="sectionTitle2">Special Treatments</h2>

<div class="grid">

<a href="thai.html" class="card">
<span id="card4">Thai Massage — 60 min — 300₪</span>
</a>

<a href="hot-stone.html" class="card">
<span id="card5">Hot Stone Massage — 60 min — 300₪</span>
</a>

</div>

</div>

<script>
function setLang(lang){

if(lang==="fr"){
subtitle.innerText="Expérience de massage privée";
sectionTitle.innerText="Les soins";
sectionTitle2.innerText="Soins spéciaux";
card1.innerText="Massage ciblé — 30 min — 100₪";
card2.innerText="Massage corps entier — 50 min — 180₪";
card3.innerText="Rituel complet — 70 min — 250₪";
card4.innerText="Massage thaï — 60 min — 300₪";
card5.innerText="Pierres chaudes — 60 min — 300₪";
mainBtn.innerText="Envoyer un message";
}

if(lang==="he"){
subtitle.innerText="חווית עיסוי פרטית";
sectionTitle.innerText="הטיפולים";
sectionTitle2.innerText="טיפולים מיוחדים";
card1.innerText="עיסוי חלקי — 30 דקות — 100₪";
card2.innerText="עיסוי גוף מלא — 50 דקות — 180₪";
card3.innerText="טיפול מלא — 70 דקות — 250₪";
card4.innerText="עיסוי תאילנדי — 60 דקות — 300₪";
card5.innerText="אבנים חמות — 60 דקות — 300₪";
mainBtn.innerText="שלח הודעה";
}

if(lang==="en"){
subtitle.innerText="Private Massage Experience";
sectionTitle.innerText="Your Treatments";
sectionTitle2.innerText="Special Treatments";
card1.innerText="Semi Massage — 30 min — 100₪";
card2.innerText="Full Body Massage — 50 min — 180₪";
card3.innerText="Complete Ritual — 70 min — 250₪";
card4.innerText="Thai Massage — 60 min — 300₪";
card5.innerText="Hot Stone Massage — 60 min — 300₪";
mainBtn.innerText="Send message";
}
}
</script>

</body>
</html>
