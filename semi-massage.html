<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Massage ciblé | Zen Therapy</title>

<style>
body{margin:0;font-family:Arial;background:#f5eee7;color:#2c211c;}
header{height:40vh;background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),url('spa.jpg.PNG') center/cover;display:flex;align-items:center;justify-content:center;color:white;position:relative;}
.lang-switch{position:absolute;top:15px;right:15px;}
.lang-switch button{margin:3px;padding:6px 10px;border:none;background:#a67c52;color:white;border-radius:20px;}
.section{padding:60px;text-align:center;}
</style>
</head>

<body>

<header>
<div class="lang-switch">
<button onclick="setLang('fr')">FR</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('he')">HE</button>
</div>
<h1 id="title">Massage ciblé — 30 min</h1>
</header>

<div class="section">
<p id="desc">
Un massage relaxant et ciblé conçu pour libérer les tensions sur deux zones de votre choix.<br><br>
Durée : 30 minutes — Prix : 100₪
</p>

<a id="book" href="https://wa.me/972586874252">Réserver</a><br><br>
<a href="index.html" id="back">← Retour aux soins</a>
</div>

<script>
function setLang(lang){
localStorage.setItem("lang",lang);
document.body.style.direction = (lang==="he")?"rtl":"ltr";

if(lang==="fr"){
title.innerText="Massage ciblé — 30 min";
desc.innerHTML="Un massage relaxant et ciblé conçu pour libérer les tensions sur deux zones de votre choix.<br><br>Durée : 30 minutes — Prix : 100₪";
book.innerText="Réserver";
back.innerText="← Retour aux soins";
}

if(lang==="en"){
title.innerText="Semi Massage — 30 min";
desc.innerHTML="A relaxing targeted massage designed to release tension.<br><br>Duration: 30 min — Price: 100₪";
book.innerText="Book appointment";
back.innerText="← Back to treatments";
}

if(lang==="he"){
title.innerText="עיסוי חלקי — 30 דקות";
desc.innerHTML="עיסוי ממוקד לשחרור מתחים.<br><br>משך: 30 דקות — מחיר: 100₪";
book.innerText="קבעי תור";
back.innerText="← חזרה לטיפולים";
}
}

document.addEventListener("DOMContentLoaded",()=>{
setLang(localStorage.getItem("lang")||"fr");
});
</script>

</body>
</html>
